<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Message</title>
  <style>
    body, table, td { background-color: #0a0a0a !important; color: #cccccc !important; }
    a { color: #00cc00 !important; }
  </style>
</head>
<body bgcolor="#0a0a0a" style="margin:0;padding:0;background-color:#0a0a0a !important;font-family:'Courier New',Courier,monospace;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#0a0a0a" style="background-color:#0a0a0a !important;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" border="0" bgcolor="#0d0d0d" style="max-width:600px;width:100%;background-color:#0d0d0d !important;border:1px solid #00ff00;border-radius:4px;overflow:hidden;">

          <!-- Header -->
          <tr>
            <td bgcolor="#000000" style="background-color:#000000 !important;padding:28px 32px;border-bottom:1px solid #00ff00;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td>
                    <p style="margin:0;font-size:11px;color:#00ff00 !important;letter-spacing:0.15em;text-transform:uppercase;">jazz-hong.github.io</p>
                    <h1 style="margin:6px 0 0;font-size:20px;color:#00ff00 !important;letter-spacing:0.08em;text-transform:uppercase;font-weight:normal;">// Portfolio Message</h1>
                  </td>
                  <td align="right" valign="middle">
                    <span style="display:inline-block;border:1px solid #00ff00;color:#00ff00 !important;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;padding:6px 14px;border-radius:2px;">New&nbsp;Message</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Greeting -->
          <tr>
            <td bgcolor="#0d0d0d" style="background-color:#0d0d0d !important;padding:32px 32px 0;">
              <p style="margin:0;font-size:15px;color:#cccccc !important;line-height:1.6;">Hi Jazz,</p>
              <p style="margin:10px 0 0;font-size:15px;color:#cccccc !important;line-height:1.6;">You have a new message from your portfolio website.</p>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td bgcolor="#0d0d0d" style="background-color:#0d0d0d !important;padding:24px 32px 0;">
              <div style="border-top:1px solid #1a3a1a;"></div>
            </td>
          </tr>

          <!-- Sender Info -->
          <tr>
            <td bgcolor="#0d0d0d" style="background-color:#0d0d0d !important;padding:24px 32px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#111111" style="background-color:#111111 !important;border:1px solid #1a3a1a;border-radius:3px;">
                <tr>
                  <td bgcolor="#111111" style="background-color:#111111 !important;padding:20px 24px;">
                    <table cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="padding-bottom:10px;">
                          <span style="font-size:14px;color:#00ff00 !important;letter-spacing:0.12em;text-transform:uppercase;">Name</span><br>
                          <span style="font-size:15px;color:#ffffff !important;font-weight:bold;margin-top:4px;display:inline-block;">{{from_name}}</span>
                        </td>
                      </tr>
                      <tr>
                        <td>
                          <span style="font-size:14px;color:#00ff00 !important;letter-spacing:0.12em;text-transform:uppercase;">Email</span><br>
                          <a href="mailto:{{reply_to}}" style="font-size:15px;color:#00cc00 !important;text-decoration:none;margin-top:4px;display:inline-block;">{{reply_to}}</a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td bgcolor="#0d0d0d" style="background-color:#0d0d0d !important;padding:0 32px;">
              <div style="border-top:1px solid #1a3a1a;"></div>
            </td>
          </tr>

          <!-- Message -->
          <tr>
            <td bgcolor="#0d0d0d" style="background-color:#0d0d0d !important;padding:24px 32px;">
              <p style="margin:0 0 10px;font-size:14px;color:#00ff00 !important;letter-spacing:0.12em;text-transform:uppercase;">Message</p>
              <p style="margin:0;font-size:15px;color:#cccccc !important;line-height:1.8;white-space:pre-wrap;">{{message}}</p>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td bgcolor="#0d0d0d" style="background-color:#0d0d0d !important;padding:0 32px;">
              <div style="border-top:1px solid #1a3a1a;"></div>
            </td>
          </tr>

          <!-- CTA -->
          <tr>
            <td bgcolor="#0d0d0d" style="background-color:#0d0d0d !important;padding:24px 32px 32px;">
              <p style="margin:0;font-size:14px;color:#888888 !important;line-height:1.6;">Hit <strong style="color:#00ff00 !important;">Reply</strong> to respond directly to <strong style="color:#ffffff !important;">{{from_name}}</strong> at <a href="mailto:{{reply_to}}" style="color:#00cc00 !important;text-decoration:none;">{{reply_to}}</a>.</p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td bgcolor="#000000" style="background-color:#000000 !important;padding:16px 32px;border-top:1px solid #00ff00;">
              <p style="margin:0;font-size:11px;color:#444444 !important;letter-spacing:0.08em;text-align:center;">Sent via <a href="https://jazz-hong.github.io" style="color:#00ff00 !important;text-decoration:none;">jazz-hong.github.io</a></p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
